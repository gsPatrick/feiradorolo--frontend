<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 420" width="1600" height="420" role="img" aria-label="Encontre o pneu certo para o seu carro">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1b3a"/>
      <stop offset="0.55" stop-color="#0f2350"/>
      <stop offset="1" stop-color="#070f24"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.78" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#ffd700" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tireFace" cx="0.4" cy="0.35" r="0.8">
      <stop offset="0" stop-color="#2a2f3a"/>
      <stop offset="0.7" stop-color="#15181f"/>
      <stop offset="1" stop-color="#0a0c10"/>
    </radialGradient>
    <linearGradient id="rim1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e6e9ef"/>
      <stop offset="0.5" stop-color="#aab2c0"/>
      <stop offset="1" stop-color="#6b7280"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="420" fill="url(#bg1)"/>
  <rect width="1600" height="420" fill="url(#glow1)"/>

  <!-- subtle road lines -->
  <g opacity="0.07" stroke="#ffffff" stroke-width="2">
    <line x1="0" y1="350" x2="1600" y2="300"/>
    <line x1="0" y1="380" x2="1600" y2="335"/>
  </g>

  <!-- TIRE big, right side -->
  <g transform="translate(1180,210)">
    <circle r="205" fill="#05070c"/>
    <circle r="205" fill="none" stroke="#000" stroke-width="6" opacity="0.6"/>
    <circle r="188" fill="url(#tireFace)"/>
    <!-- tread grooves (outer ring ranhuras) -->
    <g stroke="#3a4150" stroke-width="6" opacity="0.85">
      <circle r="198" fill="none"/>
      <circle r="182" fill="none"/>
    </g>
    <g stroke="#0c0e14" stroke-width="9">
      <g id="tread1">
        <line x1="0" y1="-205" x2="0" y2="-168"/>
      </g>
      <use href="#tread1" transform="rotate(15)"/>
      <use href="#tread1" transform="rotate(30)"/>
      <use href="#tread1" transform="rotate(45)"/>
      <use href="#tread1" transform="rotate(60)"/>
      <use href="#tread1" transform="rotate(75)"/>
      <use href="#tread1" transform="rotate(90)"/>
      <use href="#tread1" transform="rotate(105)"/>
      <use href="#tread1" transform="rotate(120)"/>
      <use href="#tread1" transform="rotate(135)"/>
      <use href="#tread1" transform="rotate(150)"/>
      <use href="#tread1" transform="rotate(165)"/>
      <use href="#tread1" transform="rotate(180)"/>
      <use href="#tread1" transform="rotate(195)"/>
      <use href="#tread1" transform="rotate(210)"/>
      <use href="#tread1" transform="rotate(225)"/>
      <use href="#tread1" transform="rotate(240)"/>
      <use href="#tread1" transform="rotate(255)"/>
      <use href="#tread1" transform="rotate(270)"/>
      <use href="#tread1" transform="rotate(285)"/>
      <use href="#tread1" transform="rotate(300)"/>
      <use href="#tread1" transform="rotate(315)"/>
      <use href="#tread1" transform="rotate(330)"/>
      <use href="#tread1" transform="rotate(345)"/>
    </g>
    <!-- rim -->
    <circle r="118" fill="url(#rim1)"/>
    <circle r="118" fill="none" stroke="#3a3f49" stroke-width="3"/>
    <circle r="34" fill="#3a3f49"/>
    <g fill="#7a818e">
      <g id="spoke1"><path d="M0,-30 L18,-104 L-18,-104 Z"/></g>
      <use href="#spoke1" transform="rotate(72)"/>
      <use href="#spoke1" transform="rotate(144)"/>
      <use href="#spoke1" transform="rotate(216)"/>
      <use href="#spoke1" transform="rotate(288)"/>
    </g>
    <circle r="14" fill="#2a2f3a"/>
  </g>

  <!-- TEXT -->
  <g transform="translate(90,150)">
    <rect x="0" y="-44" width="218" height="34" rx="17" fill="#ffd700"/>
    <text x="18" y="-21" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="800" fill="#0b1b3a" letter-spacing="1">FEIRA DO ROLO • PNEUS</text>
    <text x="0" y="36" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="800" fill="#ffffff">Encontre o pneu certo</text>
    <text x="0" y="98" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="800" fill="#ffd700">para o seu carro</text>
    <text x="2" y="150" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="500" fill="#c7d0e0">Busque por medida, aro, veículo ou marca e compare preços.</text>
  </g>
</svg>
