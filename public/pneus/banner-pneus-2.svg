<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 420" width="1600" height="420" role="img" aria-label="As melhores marcas com entrega rápida">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1730"/>
      <stop offset="0.5" stop-color="#132a55"/>
      <stop offset="1" stop-color="#08101f"/>
    </linearGradient>
    <radialGradient id="glow2" cx="0.22" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#ffd700" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tireFace2" cx="0.4" cy="0.35" r="0.8">
      <stop offset="0" stop-color="#2b313d"/>
      <stop offset="0.7" stop-color="#141821"/>
      <stop offset="1" stop-color="#090b10"/>
    </radialGradient>
    <linearGradient id="rim2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe788"/>
      <stop offset="0.5" stop-color="#ffd000"/>
      <stop offset="1" stop-color="#c79a00"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="420" fill="url(#bg2)"/>
  <rect width="1600" height="420" fill="url(#glow2)"/>

  <!-- TIRE big, left side -->
  <g transform="translate(360,215)">
    <circle r="210" fill="#05070c"/>
    <circle r="192" fill="url(#tireFace2)"/>
    <g stroke="#3a4150" stroke-width="6" opacity="0.85">
      <circle r="202" fill="none"/>
      <circle r="186" fill="none"/>
    </g>
    <g stroke="#0c0e14" stroke-width="9">
      <g id="t2"><line x1="0" y1="-210" x2="0" y2="-172"/></g>
      <use href="#t2" transform="rotate(15)"/>
      <use href="#t2" transform="rotate(30)"/>
      <use href="#t2" transform="rotate(45)"/>
      <use href="#t2" transform="rotate(60)"/>
      <use href="#t2" transform="rotate(75)"/>
      <use href="#t2" transform="rotate(90)"/>
      <use href="#t2" transform="rotate(105)"/>
      <use href="#t2" transform="rotate(120)"/>
      <use href="#t2" transform="rotate(135)"/>
      <use href="#t2" transform="rotate(150)"/>
      <use href="#t2" transform="rotate(165)"/>
      <use href="#t2" transform="rotate(180)"/>
      <use href="#t2" transform="rotate(195)"/>
      <use href="#t2" transform="rotate(210)"/>
      <use href="#t2" transform="rotate(225)"/>
      <use href="#t2" transform="rotate(240)"/>
      <use href="#t2" transform="rotate(255)"/>
      <use href="#t2" transform="rotate(270)"/>
      <use href="#t2" transform="rotate(285)"/>
      <use href="#t2" transform="rotate(300)"/>
      <use href="#t2" transform="rotate(315)"/>
      <use href="#t2" transform="rotate(330)"/>
      <use href="#t2" transform="rotate(345)"/>
    </g>
    <circle r="120" fill="url(#rim2)"/>
    <circle r="120" fill="none" stroke="#a07e00" stroke-width="3"/>
    <g fill="#b89200">
      <g id="sp2"><path d="M0,-32 L18,-106 L-18,-106 Z"/></g>
      <use href="#sp2" transform="rotate(72)"/>
      <use href="#sp2" transform="rotate(144)"/>
      <use href="#sp2" transform="rotate(216)"/>
      <use href="#sp2" transform="rotate(288)"/>
    </g>
    <circle r="34" fill="#a07e00"/>
    <circle r="14" fill="#2a2f3a"/>
  </g>

  <!-- TEXT right -->
  <g transform="translate(700,150)">
    <rect x="0" y="-44" width="218" height="34" rx="17" fill="#ffd700"/>
    <text x="18" y="-21" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="800" fill="#0b1b3a" letter-spacing="1">FEIRA DO ROLO • PNEUS</text>
    <text x="0" y="36" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="800" fill="#ffffff">As melhores marcas,</text>
    <text x="0" y="98" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="800" fill="#ffd700">entrega rápida</text>
    <text x="2" y="150" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="500" fill="#c7d0e0">Michelin, Pirelli, Goodyear, Bridgestone e muito mais.</text>
  </g>
